
<div class="right-section">
    <div class="subscribe-field">
      <input type="text" class="subscribe-field-text" placeholder="Full Name" id="contactName">
    </div>
    <div class="subscribe-field">
      <select class="subscribe-field-text" id="yogaStyle">
        <option value="">Select Yoga Style</option>
        <option value="hatha">Hatha Yoga</option>
        <option value="Vinyasa">Vinyasa</option>
        <option value="ashtanga">Ashtanga</option>
      </select>
    </div>
    <div class="subscribe-field">
      <input type="email" class="subscribe-field-text" placeholder="Email Address" id="teacherEmail">
    </div>
    <div class="subscribe-field">
      <input type="url" class="subscribe-field-text" placeholder="web site" id="website">
    </div>
    <div class="subscribe-field">
      <select class="subscribe-field-text" id="country">
        <option value="">-- Select Country --</option>
        <option value="AU">Australia</option>
        <option value="BR">Brazil</option>
        <option value="CA">Canada</option>
        <option value="DE">Germany</option>
        <option value="FR">France</option>
        <option value="GB">United Kingdom</option>
        <option value="IL">Israel</option>
        <option value="IN">India</option>
        <option value="JP">Japan</option>
        <option value="US">United States</option>
      </select>
    </div>
    <div class="subscribe-field">
      <input type="password" class="subscribe-field-text" placeholder="Password" id="password">
    </div>
    <div class="subscribe-large-field">
      <textarea class="subscribe-field-text" placeholder="Optional Message" id="message"></textarea>
    </div>
  </div>
