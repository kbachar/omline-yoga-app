@if (isOpen()) {
<div class="modal-overlay" (click)="close()" aria-hidden="true">
  <section class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title"
    (click)="$event.stopPropagation()">
    <div class="popup">
    <span id="closeBtn" class="close-btn" (click)="close()">x</span>
      <div class="popup-body">
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Password" />
        <img src="/assets/images/login-yoga-pose.png" alt="Yoga pose illustration" />
        <button type="button">Login</button>
        <div class="error"></div>
      </div>
    </div>
  </section>
</div>
}
